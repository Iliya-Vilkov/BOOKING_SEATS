# Максимальное количество подключений
max_connections = 1000

# Объём памяти, используемый PostgreSQL для кэширования данных
shared_buffers = 256MB

# Оценка объёма памяти, доступной для кэширования ОС
effective_cache_size = 768MB

# Память для операций VACUUM, CREATE INDEX, etc.
maintenance_work_mem = 64MB

# Размер буферов журнала транзакций (WAL)
wal_buffers = 16MB

# Целевое завершение контрольных точек (checkpoint)
checkpoint_completion_target = 0.7

# Автоматическая настройка статистики для планировщика
default_statistics_target = 100

# Слушать все IP (в Docker это безопасно)
listen_addresses = '*'

# Порт
port = 5432

# Максимальный размер сегмента WAL
max_wal_size = 4GB
min_wal_size = 1GB

# Частота контрольных точек
checkpoint_timeout = 15min

# Включить автовакуум
autovacuum = on

# Минимальный интервал между запусками
autovacuum_naptime = 10s

# Порог для запуска VACUUM (по умолчанию 50 + 0.2 * reltuples)
autovacuum_vacuum_threshold = 50

# Аналогично для ANALYZE
autovacuum_analyze_threshold = 50

# Включить логирование
logging_collector = on

# Формат времени
log_timezone = 'UTC'
timezone = 'UTC'

# Имя файла лога
log_filename = 'postgresql-%Y-%m-%d.log'

# Ротация логов
log_rotation_age = 1d
log_rotation_size = 100MB

# Разрешить быстрый параллельный скан
random_page_cost = 1.1

# Для SSD
effective_io_concurrency = 200
