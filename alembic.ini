[alembic]
# Папка с миграциями
script_location = alembic

# Добавляем путь в sys.path
prepend_sys_path = .

# Часовой пояс
timezone = utc

# URL базы данных — использует переменные из окружения
sqlalchemy.url = postgresql+asyncpg://%(DB_USER)s:%(DB_PASS)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

[post_write_hooks]
# Пример: форматирование через black (опционально)
# hooks=black
# hooks.black.type=console_script
# hooks.black.entrypoint=black
# hooks.black.options=-l 79

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S